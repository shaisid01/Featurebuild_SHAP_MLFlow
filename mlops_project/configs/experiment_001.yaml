mlflow:
  experiment_name: MLOps_Santander_Trans_Pred9

experiment_name: Santander_MLOps_v9
seed: 42

data:
  train_path: data/train.csv
  test_path: data/test.csv

features:
  use_row_stats: true
  use_frequency_encoding: true
  use_interactions: true
  use_shap_pruning: true
  top_shap_features: 10
  top_interaction_pairs: 25

model:
  type: ensemble
  lgb_params:
    learning_rate: 0.03
    num_leaves: 64
    max_depth: -1
    n_estimators: 1000
    objective: binary
    metric: auc
    n_jobs: -1

    min_data_in_leaf: 20
    min_gain_to_split: 0
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    lambda_l2: 1
    verbosity: -1

  cat_params:
    iterations: 800
    learning_rate: 0.02
    depth: 6
    loss_function: Logloss
    eval_metric: AUC
    verbose: False

cv:
  folds: 3
  shuffle: true

